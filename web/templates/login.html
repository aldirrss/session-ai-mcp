<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — {{ app_name }}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
           background: #f8fafc; display: flex; min-height: 100vh;
           align-items: center; justify-content: center; }
    .card { background: #fff; border: 1px solid #e2e8f0; border-radius: 16px;
            padding: 40px; width: 100%; max-width: 400px; box-shadow: 0 4px 24px rgba(0,0,0,.06); }
    .logo { font-size: 13px; font-weight: 700; color: #64748b; letter-spacing: .08em;
            text-transform: uppercase; margin-bottom: 24px; }
    h1 { font-size: 22px; font-weight: 700; color: #0f172a; margin-bottom: 24px; }
    label { display: block; font-size: 13px; font-weight: 500; color: #374151; margin-bottom: 5px; }
    input { width: 100%; padding: 10px 12px; border: 1px solid #d1d5db; border-radius: 8px;
            font-size: 14px; outline: none; margin-bottom: 16px; }
    input:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,.12); }
    .btn { width: 100%; padding: 11px; border: none; border-radius: 8px; font-size: 14px;
           font-weight: 600; cursor: pointer; background: #2563eb; color: #fff; }
    .btn:hover { background: #1d4ed8; }
    .error { background: #fef2f2; border: 1px solid #fecaca; color: #dc2626;
             border-radius: 8px; padding: 10px 14px; font-size: 13px; margin-bottom: 16px; }
    .footer { text-align: center; font-size: 12px; color: #94a3b8; margin-top: 20px; }
    .footer a { color: #3b82f6; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">{{ app_name }}</div>
  <h1>Sign in</h1>
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
  <form method="POST">
    <input type="hidden" name="next" value="{{ next }}"/>
    <label for="email">Email</label>
    <input id="email" name="email" type="email" autocomplete="email" placeholder="you@example.com" required/>
    <label for="password">Password</label>
    <input id="password" name="password" type="password" autocomplete="current-password" placeholder="••••••••" required/>
    <button class="btn" type="submit">Sign in</button>
  </form>
  <div class="footer">
    No account? <a href="/panel/web/register">Create one</a>
  </div>
</div>
</body>
</html>
