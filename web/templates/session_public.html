<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{{ session.title }} — {{ app_name }}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
           background: #f8fafc; color: #0f172a; min-height: 100vh; }
    header { background: #fff; border-bottom: 1px solid #e2e8f0; padding: 14px 24px;
             display: flex; align-items: center; justify-content: space-between; }
    .logo { font-weight: 700; font-size: 14px; color: #64748b; letter-spacing: .05em; text-transform: uppercase; }
    .badge { display: inline-block; padding: 3px 10px; border-radius: 9999px; font-size: 12px;
             font-weight: 600; background: #f1f5f9; color: #475569; }
    .container { max-width: 820px; margin: 40px auto; padding: 0 24px; }
    .meta { font-size: 13px; color: #64748b; margin-bottom: 24px; }
    .meta code { background: #f1f5f9; padding: 2px 6px; border-radius: 4px; font-size: 12px; }
    h1 { font-size: 26px; font-weight: 700; margin-bottom: 8px; }
    .card { background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; padding: 24px; }
    .prose { font-size: 14px; line-height: 1.75; white-space: pre-wrap; font-family: 'SF Mono', 'Fira Code', monospace; }
    .login-cta { text-align: center; margin-top: 32px; font-size: 14px; color: #64748b; }
    .login-cta a { color: #2563eb; }
  </style>
</head>
<body>
<header>
  <span class="logo">{{ app_name }}</span>
  <span class="badge">Read-only view</span>
</header>
<div class="container">
  <h1>{{ session.title }}</h1>
  <div class="meta">
    Last updated: {{ session.updated_at[:16].replace('T', ' ') }}
  </div>
  <div class="card">
    <div class="prose">{% if session.content %}{{ session.content }}{% else %}No content yet.{% endif %}</div>
  </div>
  <div class="login-cta">
    Want to collaborate? <a href="/panel/web/register">Create an account</a> or <a href="/panel/web/login">sign in</a>.
  </div>
</div>
</body>
</html>
