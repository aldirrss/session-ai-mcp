services:
  mcp:
    build: .
    container_name: session-ai
    restart: unless-stopped
    ports:
      - ${MCP_PORT:-8765}:${MCP_PORT:-8765}
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - MCP_EXTERNAL_URL=${MCP_EXTERNAL_URL}
      - MCP_HOST=${MCP_HOST:-0.0.0.0}
      - MCP_PORT=${MCP_PORT:-8765}
      - TOKEN_TTL_DAYS=${TOKEN_TTL_DAYS:-30}
      - APP_NAME=${APP_NAME:-session-ai-mcp}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    container_name: session-ai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-session_ai_mcp}
      POSTGRES_USER: ${POSTGRES_USER:-mcp}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mcp -d session_ai_mcp"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
